<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Loja VIP</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div id="app" class="hidden">
		<div class="shop">
			<!-- Sidebar -->
			<aside class="sidebar">
				<div class="sidebar-brand">
					<div class="brand-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
						</svg>
					</div>
					<div>
						<h1>Premium Store</h1>
						<span>Loja VIP</span>
					</div>
				</div>

				<nav id="category-nav" class="category-nav"></nav>

				<div class="sidebar-footer">
					<button class="nav-item" data-view="history">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
						<span>Histórico</span>
					</button>
				</div>
			</aside>

			<!-- Main -->
			<main class="main">
				<header class="topbar">
					<div class="topbar-left">
						<h2 id="section-title">Todos os Produtos</h2>
						<p id="section-desc">Explore nossa seleção premium</p>
					</div>
					<div class="topbar-right">
						<div class="search-box">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
							<input type="text" id="search-input" placeholder="Buscar produtos...">
						</div>
						<div class="balance-card">
							<div class="balance-item gems">
								<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 9l10 13L22 9 12 2z"/></svg>
								<div>
									<span class="balance-label">Diamantes</span>
									<span class="balance-value" id="balance-gems">0</span>
								</div>
							</div>
							<div class="balance-item bank">
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
								<div>
									<span class="balance-label">Banco</span>
									<span class="balance-value" id="balance-bank">R$ 0</span>
								</div>
							</div>
						</div>
						<div class="player-chip" id="player-chip">
							<span class="player-name" id="player-name">Jogador</span>
							<span class="player-vip hidden" id="player-vip">VIP</span>
						</div>
						<button class="btn-close" id="btn-close" title="Fechar (ESC)">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
						</button>
					</div>
				</header>

				<!-- Products View -->
				<section id="view-products" class="content">
					<div id="product-grid" class="product-grid"></div>
				</section>

				<!-- History View -->
				<section id="view-history" class="content hidden">
					<div id="history-list" class="history-list"></div>
				</section>
			</main>
		</div>

		<!-- Purchase Modal -->
		<div id="modal-overlay" class="modal-overlay hidden">
			<div class="modal">
				<div class="modal-header">
					<h3 id="modal-title">Confirmar Compra</h3>
					<button class="modal-close" id="modal-close">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
					</button>
				</div>
				<div class="modal-body">
					<div class="modal-product">
						<div class="modal-icon" id="modal-icon"></div>
						<div>
							<h4 id="modal-product-name">Produto</h4>
							<p id="modal-product-desc">Descrição</p>
						</div>
					</div>
					<ul id="modal-benefits" class="modal-benefits"></ul>
					<div class="modal-price">
						<span>Total</span>
						<div class="price-tag" id="modal-price">
							<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2L2 9l10 13L22 9 12 2z"/></svg>
							<span id="modal-price-value">0</span>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
					<button class="btn btn-primary" id="modal-confirm">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
						Confirmar Compra
					</button>
				</div>
			</div>
		</div>

		<!-- Toast -->
		<div id="toast" class="toast hidden">
			<span id="toast-icon"></span>
			<span id="toast-message"></span>
		</div>
	</div>

	<script src="js/app.js"></script>
</body>
</html>
